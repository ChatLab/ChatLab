                    - strong [ref=e694]: AI that can actually operate on data
                    - text: ": Agent + Function Calling workflows can search, summarize, and analyze chat records with context."
                  - listitem [ref=e695]:
                    - text: 📊
                    - strong [ref=e696]: Insight-rich visual views
