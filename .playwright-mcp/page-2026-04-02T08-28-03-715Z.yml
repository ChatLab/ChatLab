                    - img [ref=e731]
                - list [ref=e733]:
                  - listitem [ref=e734]:
                    - strong [ref=e735]: Local-first by default
                    - text: ": Raw chat data, indexes, and settings remain on-device unless you explicitly choose otherwise."
                  - listitem [ref=e736]:
                    - strong [ref=e737]: Streaming over buffering
                    - text: ": Stream-first parsing and incremental processing keep large imports stable and memory-efficient."
                  - listitem [ref=e738]:
                    - strong [ref=e739]: Composable intelligence
                    - text: ": AI features are assembled through Agent + Tool Calling, not hard-coded into one model path."
                  - listitem [ref=e740]:
                    - strong [ref=e741]: Schema-first evolution
                    - text: ": Import, query, analysis, and visualization share a consistent data model that scales with new features."
                - generic [ref=e742]:
                  - heading "Runtime Architecture" [level=3] [ref=e743]
                  - 'link "Permalink: Runtime Architecture" [ref=e744] [cursor=pointer]':
                    - /url: "#runtime-architecture"
                    - img [ref=e745]
                - list [ref=e747]:
                  - listitem [ref=e748]:
                    - strong [ref=e749]: Main Process (control plane)
                    - text: ":"
                    - code [ref=e750]: electron/main/index.ts
                    - text: handles lifecycle and windows.
                    - code [ref=e751]: electron/main/ipc/
                    - text: defines domain-scoped IPC, while
                    - code [ref=e752]: electron/main/ai/
                    - text: and
                    - code [ref=e753]: electron/main/i18n/
                    - text: provide shared AI and localization services.
                  - listitem [ref=e754]:
                    - strong [ref=e755]: Worker Layer (compute plane)
                    - text: ":"
                    - code [ref=e756]: electron/main/worker/
                    - text: runs import, indexing, and query tasks via
                    - code [ref=e757]: workerManager
                    - text: ", keeping CPU-heavy work off the UI thread."
                  - listitem [ref=e758]:
                    - strong [ref=e759]: Renderer Layer (interaction plane)
                    - text: ": Vue 3 + Nuxt UI + Tailwind CSS drive management, private chat, group chat, and analysis interfaces."
                    - code [ref=e760]: electron/preload/index.ts
                    - text: exposes tightly scoped APIs for secure process boundaries.
                - generic [ref=e761]:
